name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  security:
    name: 🔐 Security Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  backend:
    needs: [security]
    name: 🔧 Backend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: {{BACKEND_DIR}}/package-lock.json
      - name: Install dependencies
        working-directory: {{BACKEND_DIR}}
        run: npm ci
      - name: TypeScript compile
        working-directory: {{BACKEND_DIR}}
        run: npx tsc --noEmit
      - name: Run tests
        working-directory: {{BACKEND_DIR}}
        run: npm test
      - name: Security audit
        working-directory: {{BACKEND_DIR}}
        run: npm audit --audit-level=high

  frontend:
    needs: [security]
    name: 🎨 Frontend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: {{FRONTEND_DIR}}/package-lock.json
      - name: Install dependencies
        working-directory: {{FRONTEND_DIR}}
        run: npm ci
      - name: Lint
        working-directory: {{FRONTEND_DIR}}
        run: npm run lint
      - name: Build
        working-directory: {{FRONTEND_DIR}}
        run: npm run build
      - name: Security audit
        working-directory: {{FRONTEND_DIR}}
        run: npm audit --audit-level=high
